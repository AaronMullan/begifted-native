name: Apply DB Migrations

# Applies any new supabase/migrations/** to the production database on merge to
# main, so migrations can no longer be merged-but-never-applied.
#
# Uses the Supabase Management API via SUPABASE_ACCESS_TOKEN — the same secret the
# edge-functions workflow uses. No database password / connection string needed.

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: qgcyndtymegkobgfcpdh
        run: node scripts/apply-migrations.mjs
