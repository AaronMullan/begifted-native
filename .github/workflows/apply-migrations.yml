name: Apply DB Migrations

# Applies any new supabase/migrations/** to the production database on merge to
# main, so migrations can no longer be merged-but-never-applied.
#
# Requires the `SUPABASE_DB_URL` repo secret: the project's Postgres connection
# string (session pooler or direct), with the password percent-encoded. Found in
# Supabase Dashboard → Project Settings → Database → Connection string.

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push pending migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set. Add the project's Postgres connection string (password percent-encoded) under Settings → Secrets and variables → Actions."
            exit 1
          fi
          supabase db push --db-url "$SUPABASE_DB_URL" --yes
